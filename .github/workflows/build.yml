name: Build Indus Reader APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # YEH NAYA STEP HAI: Jo automatic Android folder aur Gradle files banayega
      - name: Generate Missing Android Files
        run: |
          flutter create temp_app --platforms=android --org com.indusreader
          cp -r temp_app/android ./android
          rm -rf temp_app

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IndusReader-APK
          path: build/app/outputs/flutter-apk/app-release.apk
