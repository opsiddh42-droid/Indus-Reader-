name: Build Indus Reader APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      # --- NAYA STEP: AI Model ko direct GitHub server par download karna ---
      - name: Download AI Model (TinyLlama)
        run: |
          mkdir -p assets/models
          echo "Downloading TinyLlama AI model..."
          wget -q -O assets/models/tinyllama.gguf https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf
          echo "Download complete!"

      # Icon ko zabardasti APK banne se pehle generate karna
      - name: Generate App Icon
        run: flutter pub run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --debug

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Indus Reader APK (Direct Download)
          files: build/app/outputs/flutter-apk/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
