name: Build Indus Reader APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build C++ Llama Engine for Android
        run: |
          echo "Llama.cpp download aur Android ke liye compile ho raha hai..."
          git clone https://github.com/ggerganov/llama.cpp.git
          cd llama.cpp
          
          # Yahan ChatGPT ke bataye naye flags add kiye hain (NATIVE=OFF, STL=c++_shared, etc.)
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-24 -DBUILD_SHARED_LIBS=ON -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_SERVER=OFF -DLLAMA_OPENMP=OFF -DGGML_OPENMP=OFF -DGGML_METAL=OFF -DGGML_CUDA=OFF -DGGML_VULKAN=OFF -DGGML_NATIVE=OFF -DANDROID_STL=c++_shared
          cmake --build build --config Release
          
          # Flutter ke Android folder me "jniLibs" (C++ libraries ka folder) banana
          mkdir -p ../android/app/src/main/jniLibs/arm64-v8a
          
          # Compile ki hui saari .so files ko APK me pack hone ke liye daalna
          find build -name "*.so" -exec cp {} ../android/app/src/main/jniLibs/arm64-v8a/ \;
          echo "C++ Engine successfully APK me daal diya gaya hai!"

      - name: Generate App Icon
        run: flutter pub run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --debug

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Indus Reader APK (Offline AI)
          files: build/app/outputs/flutter-apk/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
