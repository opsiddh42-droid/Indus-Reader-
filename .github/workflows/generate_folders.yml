name: Generate Android Folder

on: 
  workflow_dispatch: 

# NAYA: GitHub Bot ko code save (push) karne ki permission dena
permissions:
  contents: write

jobs:
  build_folders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Platform Folders
        run: flutter create .

      - name: Commit and Push Folders to GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add android/
          git commit -m "Generated Android folder automatically" || echo "No changes to commit"
          git push
