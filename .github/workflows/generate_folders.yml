name: Generate Android Folder

# Ye workflow apne aap nahi chalega, hum ise manual button dabakar chalayenge
on: 
  workflow_dispatch: 

jobs:
  build_folders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Platform Folders
        # Ye command aapke app ke liye android aur ios folders bana degi
        run: flutter create .

      - name: Commit and Push Folders to GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add android/
          git commit -m "Generated Android folder automatically" || echo "No changes to commit"
          git push
