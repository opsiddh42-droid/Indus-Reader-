name: indus_reader
description: A complete PDF Reader and Editor app with Pro features.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # In sabhi libraries ko 'any' kar diya hai taaki koi version error na aaye
  syncfusion_flutter_pdfviewer: any
  syncfusion_flutter_pdf: any
  file_picker: any
  shared_preferences: any
  path_provider: any
  google_mlkit_text_recognition: any
  # NAYA: Document Scanner ke liye library add ki hai
  google_mlkit_document_scanner: any
  receive_sharing_intent: ^1.6.2

# NAYA: App icon generate karne ke liye library
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

# YAHAN CHANGE KIYA HAI: Warning hatane ke liye naya naam lagaya hai
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "icon.png"
  min_sdk_android: 21
