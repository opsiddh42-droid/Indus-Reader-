name: indus_reader
description: A complete PDF Reader and Editor app with Pro features.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # In sabhi libraries ko 'any' kar diya hai taaki koi version error na aaye
  syncfusion_flutter_pdfviewer: any
  syncfusion_flutter_pdf: any
  file_picker: any
  shared_preferences: any
  path_provider: any
  google_mlkit_text_recognition: any
  # Document Scanner ke liye library
  google_mlkit_document_scanner: any
  receive_sharing_intent: ^1.6.2
  
  # --- CLOUD AI & SECURITY DEPENDENCIES ---
  google_generative_ai: ^0.4.6
  flutter_dotenv: ^5.1.0
  flutter_tts: ^4.0.2

  # --- NAYA MARKDOWN PACKAGE (Scroll aur Bold Formatting ke liye) ---
  flutter_markdown: any

# App icon generate karne ke liye library
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

# Ek hi 'flutter' section jisme dono (env aur font) assets hain
flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/fonts/hindi_font.ttf

# iOS ko false kar diya taaki error na aaye
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "icon.png"
  min_sdk_android: 21
